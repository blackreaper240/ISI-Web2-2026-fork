<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - Yamilg</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Teams</h1>

        <form id="teamForm">
            <h2 id="formTitle">Crear equipo</h2>
            <input type="text" name="name" placeholder="Nombre" />
            <input type="text" name="description" placeholder="Descripción" />
            <div class="form-buttons">
                <button type="submit">Guardar</button>
                <button type="button" id="cancelBtn">Cancelar</button>
            </div>
        </form>

        <div class="search-bar">
            <input type="text" id="searchId" placeholder="Buscar por ID..." />
            <button type="button" id="searchBtn">Buscar</button>
            <button type="button" id="loadAllBtn">Ver todos</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Miembros</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="teamsBody">
                <tr><td colspan="5">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
