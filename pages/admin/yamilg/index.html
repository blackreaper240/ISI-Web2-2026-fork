<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - Yamilg</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Teams</h1>

        <!-- Formulario crear / editar -->
        <div class="form-box">
            <h2 id="formTitle">Crear equipo</h2>
            <input type="text" id="inputName" placeholder="Nombre" />
            <input type="text" id="inputDescription" placeholder="Descripción" />
            <div class="form-buttons">
                <button onclick="saveTeam()">Guardar</button>
                <button class="cancel-btn" onclick="cancelEdit()">Cancelar</button>
            </div>
        </div>

        <!-- Buscar por ID -->
        <div class="search-bar">
            <input type="text" id="searchId" placeholder="Buscar por ID..." />
            <button onclick="searchById()">Buscar</button>
            <button onclick="loadAll()">Ver todos</button>
        </div>

        <!-- Tabla -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Miembros</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="teamsBody">
                <tr><td colspan="5">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
